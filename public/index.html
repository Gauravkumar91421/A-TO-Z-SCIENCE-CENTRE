<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A TO Z Science Centre</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<div class="container" id="container">

    <!-- Sign Up -->
    <div class="form-container sign-up-container">

        <form id="signupForm">

            <h1>Create Account</h1>

            <div class="social-container">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
     <div id="g_id_onload"
     data-client_id="845623011305-ekj7cnk646cmi22qdnkrfhtp6bobu4p1.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-theme="outline"
     data-size="large"
     data-shape="pill"
     data-text="signin_with"
     data-logo_alignment="left">
</div>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
            </div>

            <span>or use your email</span>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email">

            <input type="password" placeholder="Password">

            <button type="submit">SIGN UP</button>

        </form>

    </div>

    <!-- Login -->

    <div class="form-container sign-in-container">

        <form id="loginForm">

            <h1>Student Login</h1>

            <div class="social-container">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-google"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
            </div>

            <span>or use your account</span>

            <input type="email" placeholder="Email" required>

            <input type="password" placeholder="Password"required>

            <a href="#">Forgot Password?</a>

            <button type="submit">LOGIN</button>

        </form>

    </div>

    <!-- Overlay -->

    <div class="overlay-container">

        <div class="overlay">

            <div class="overlay-panel overlay-left">

                <h1>Welcome Back!</h1>

                <p>Login with your personal information</p>

                <button class="ghost" id="signIn">

                    SIGN IN

                </button>

            </div>

            <div class="overlay-panel overlay-right">

                <h1>Hello Student!</h1>

                <p>Create your account and start learning with us.</p>

                <button class="ghost" id="signUp">

                    SIGN UP

                </button>

            </div>

        </div>

    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
