<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Result</title>

<link rel="stylesheet" href="result.css">

</head>

<body>

<div class="result-box">

<h1>🎉 Quiz Completed</h1>

<h2 id="welcome"></h2>

<div class="result-card">

<p><strong>👤 Student :</strong> <span id="student"></span></p>

<p><strong>📚 Subject :</strong> <span id="subject"></span></p>

<p><strong>🏆 Score :</strong> <span id="score"></span></p>

<p><strong>📊 Percentage :</strong> <span id="percentage"></span></p>

<p><strong>🥇 Grade :</strong> <span id="grade"></span></p>

<div id="review"></div>
<p id="message"></p>

</div>

<div class="buttons">

<button onclick="location.href='quiz.html'">

🔄 Restart Quiz

</button>

<button onclick="location.href='home.html'">

🏠 Home

</button>

</div>

</div>


<script src="result.js"></script>

</body>

</html>
