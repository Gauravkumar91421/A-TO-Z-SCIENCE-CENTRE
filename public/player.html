<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A TO Z SCIENCE CENTRE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
}

header{

background:#ff7a00;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;

}

.logo{

font-size:22px;
font-weight:bold;

}

.back{

background:white;
color:#ff7a00;
padding:10px 18px;
border-radius:30px;
text-decoration:none;
font-weight:bold;

}

.container{

width:95%;
max-width:1000px;
margin:20px auto;

}

.video{

border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.5);

}

iframe{

width:100%;
height:550px;
border:none;

}

.title{

margin-top:20px;
font-size:28px;
font-weight:bold;

}

.desc{

margin-top:10px;
font-size:17px;
color:#ddd;
line-height:28px;

}

.buttons{

display:flex;
gap:15px;
margin-top:30px;

}

.btn{

flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#ff7a00;
color:white;

}

.btn:hover{

background:#ff5c00;

}

@media(max-width:768px){

iframe{

height:230px;

}

.title{

font-size:22px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">
🎓 A TO Z SCIENCE CENTRE
</div>

<a href="watchvideos.html" class="back">
⬅ Back
</a>

</header>

<div class="container">

<div class="video">

<iframe
id="player"
allowfullscreen>
</iframe>

</div>

<div class="title" id="title">
Loading...
</div>

<div class="desc">

Learn • Understand • Succeed

</div>

<div class="buttons">

<button class="btn">
📚 Notes
</button>

<button class="btn">
📝 Quiz
</button>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

const title=params.get("title");

document.getElementById("player").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1";

document.getElementById("title").innerHTML=
decodeURIComponent(title);

</script>

</body>
</html>
